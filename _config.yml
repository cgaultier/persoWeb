  desc: "I work as a Research Fellow at the Hearing Institute in Paris, studying with a multidisciplinary approach, speech and sound perception for people listening with cochlear implants including new speech enhancement strategies to restore intelligibility whilst preserving auditory awareness of the environemnt. My research interests include speech and sound perception, cochlear implants, multi-microphone speech enhancement, speaker discrimination,... During my PhD I had been working on declipping and denoising using analysis/synthesis sparse priors. I also worked on binaural sound source localization with massive regressions machine learning techniques. Additionally, I am really interested in other auditory science related topics such as augmented hearing, or hearing protection."

